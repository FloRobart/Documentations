worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;

  keepalive_timeout  65;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; font-src * data:; connect-src * data: blob: ws: wss:; frame-src *;" always;

  # Logging to stdout/stderr for Docker
  access_log /dev/stdout;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    server_name _;

    client_max_body_size 1m;

    # Serve favicon from MkDocs static image path.
    location = /favicon.ico {
      try_files /img/favicon.ico =404;
      access_log off;
      log_not_found off;
    }

    # Fallback pour les autres requêtes: essayer de servir le fichier, sinon 404.
    location / {
      try_files $uri $uri/ =404;
    }

    # Deny access to hidden files and VCS internals.
    location ~ /\. {
      deny all;
      return 404;
    }

    location ~ /\.git {
      deny all;
      return 404;
    }
  }
}
