services:
  documentations-server:
    image: documentations-server:latest
    build: .
    working_dir: /app
    restart: always
    networks:
      - documentations-network
    ports:
      - ${APP_PORT:-}:80
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    user: "1800:1800"
    tmpfs:
      - /tmp:exec,nosuid,nodev,uid=1800,gid=1800
      - /run:rw,mode=0755,uid=1800,gid=1800
      - /run/nginx:rw,mode=0755,uid=1800,gid=1800
      - /var/cache/nginx:rw,uid=1800,gid=1800
      - /var/cache/nginx/client_temp:rw,uid=1800,gid=1800
      - /var/cache/nginx/proxy_temp:rw,uid=1800,gid=1800
      - /var/cache/nginx/fastcgi_temp:rw,uid=1800,gid=1800
      - /var/cache/nginx/uwsgi_temp:rw,uid=1800,gid=1800
      - /var/cache/nginx/scgi_temp:rw,uid=1800,gid=1800
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://documentations-server:80/"]
      interval: 10m
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=documentations-network"
      - "traefik.http.routers.documentations-server.rule=Host(`documentation.florobart.fr`)"
      - "traefik.http.routers.documentations-server.entrypoints=websecure"
      - "traefik.http.routers.documentations-server.tls.certresolver=le"
      - "traefik.http.services.documentations-server.loadbalancer.server.port=80"



networks:
  documentations-network:
    name: documentations-network
    driver: bridge
